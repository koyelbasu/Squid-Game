<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <title>Squid Game</title>
</head>

<body>
    <div class="container">

        <nav class="navbar">
            <img src="asssests/game.png" alt="">
            <div class="links">
                <a href="#">About</a>
                <a href="#">Watch Now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </div>
            <i class="ri-menu-3-line"></i>
        </nav>

        <div class="left">
            <img src="asssests/logo.png" alt="">
            <p>
            <h5>Action / Thriller/ Drama Series directed by Dong-hyuk Hwang<br> Season 1:9 Episodes</h5>
            </p>
            <div class="buttons">
                <button class="play">
                    <i class="ri-play-circle-fill"></i>
                    Play Now
                </button>
                <button class="thriller">
                    <i class="ri-play-mini-line"></i>
                    Watch Trailer
                </button>
            </div>
            <div class="vert">
                <div class="line"></div>
                <p>SCROLL</p>
            </div>
            <div class="game">
                <b>GAME</b>
            </div>
            <div class="squid">
                <b>SQUID</b>
            </div>
           <div class="head"><img src="asssests/main.png" alt=""></div>
        </div>
        <div class="right">
            <div class="icon">
                <i class="ri-twitter-line"></i>
                <i class="ri-instagram-line"></i>
                <i class="ri-facebook-line"></i>
            </div>
        </div>
        <div class="cards">
            <div class="card">
                <img src="asssests/group.png" alt="">
                <i class="ri-play-circle-fill"></i>
            </div>
            <div class="card">
                <img src="asssests/mask.png" alt="">
                <i class="ri-play-circle-fill"></i>
            </div>
            <div class="card">
                <img src="asssests/last.png" alt="">
                <i class="ri-play-circle-fill"></i>
            </div>
        </div>
    </div>
</body>

</html>
